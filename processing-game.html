<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Processing Speed Training</title>

<link rel="stylesheet" href="style.css">

<style>

/* PAGE BACKGROUND */

body{
 margin:0;
 font-family:system-ui,sans-serif;
 background:linear-gradient(135deg,#0f172a,#020617);
 color:white;
}

/* NAVBAR */

.navbar{
 position:fixed;
 top:0;
 width:100%;
 padding:18px;
 background:rgba(2,6,23,.9);
 backdrop-filter:blur(20px);
 display:flex;
 justify-content:center;
 gap:30px;
 z-index:1000;
}

.navbar a{
 color:white;
 text-decoration:none;
 font-weight:600;
}

/* CARD */

.card{
 width:700px;
 max-width:90%;
 margin:140px auto;
 padding:50px;
 border-radius:24px;
 background:rgba(255,255,255,.05);
 backdrop-filter:blur(30px);
 text-align:center;
 box-shadow:0 40px 80px rgba(0,0,0,.6);
}

/* INPUT */

input{
 padding:14px;
 width:80%;
 border-radius:10px;
 border:none;
 font-size:20px;
 text-align:center;
 background:rgba(255,255,255,.08);
 color:white;
}

/* TEXT */

.big{
 font-size:40px;
 font-weight:bold;
}

button{
 margin-top:20px;
 padding:14px 32px;
 border:none;
 border-radius:12px;
 background:linear-gradient(90deg,#e94560,#ff758c);
 color:white;
 font-size:18px;
 cursor:pointer;
}

.timer{
 opacity:.8;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">
<a href="index.html">Home</a>
<a href="test.html">Assessment</a>
<a href="memory-game.html">Memory</a>
<a href="attention-game.html">Attention</a>
<a href="processing-game.html">Processing</a>
<a href="logic-game.html">Logic</a>
<a href="dashboard.html">Dashboard</a>
</div>

<!-- GAME CONTAINER -->

<div class="card">

<h1>⚡ Processing Speed Training</h1>

<div id="game"></div>

<button onclick="startRound()">Start Round</button>

</div>

<script>

/* ===============================
   PROCESSING GAME LOGIC
=============================== */

const game=document.getElementById("game");

let round=0;
let currentWord="";
let startTime=null;
let score=0;

/* WORD BANK */

const words=[
"neuron",
"synapse",
"cortex",
"memory",
"signal",
"reaction",
"attention",
"stimulus",
"response",
"processing"
];

/* UTIL */

function randomWord(){
 return words[Math.floor(Math.random()*words.length)];
}

/* GAME FLOW */

function startRound(){

 currentWord=randomWord();

 game.innerHTML=`
 <h2>Type this word as fast as possible</h2>
 <div class="big">${currentWord}</div>

 <input id="input" autofocus placeholder="Type here + Enter">
 `;

 let input=document.getElementById("input");

 startTime=performance.now();

 input.addEventListener("keydown",e=>{
  if(e.key==="Enter"){
   checkAnswer(input.value);
  }
 });

}

/* CHECK ANSWER */

function checkAnswer(value){

 let time=(performance.now()-startTime)/1000;

 if(value.trim().toLowerCase()===currentWord){

  let wpm=(currentWord.length/5)/(time/60);
  score+=wpm;

  alert(
   "Correct!\nTime: "+time.toFixed(2)+"s"
  );

 }
 else{
  alert("Incorrect!");
 }

 round++;

 game.innerHTML="";
}

/* START */

startRound();

</script>

</body>
</html>
