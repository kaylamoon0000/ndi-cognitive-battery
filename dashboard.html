<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Performance Dashboard</title>
<script src="auth.js"></script>

<link rel="stylesheet" href="style.css">

<style>

body{
 margin:0;
 font-family:system-ui,sans-serif;
 background:linear-gradient(135deg,#0f172a,#020617);
 color:white;
}

/* NAVBAR */

.navbar{
 position:fixed;
 top:0;
 width:100%;
 padding:18px;
 background:rgba(2,6,23,.9);
 backdrop-filter:blur(20px);
 display:flex;
 justify-content:center;
 gap:30px;
 z-index:1000;
}

.navbar a{
 color:white;
 text-decoration:none;
 font-weight:600;
}

/* CARD */

.card{
 width:800px;
 max-width:92%;
 margin:140px auto;
 padding:50px;
 border-radius:24px;
 background:rgba(255,255,255,.05);
 backdrop-filter:blur(30px);
 text-align:center;
 box-shadow:0 40px 80px rgba(0,0,0,.6);
}

/* METRIC GRID */

.metricGrid{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
 gap:25px;
 margin-top:30px;
}

.metricBox{
 padding:25px;
 border-radius:16px;
 background:rgba(255,255,255,.05);
}

.metricValue{
 font-size:34px;
 font-weight:bold;
}

</style>

</head>

<body>
<script>
requireLogin();
</script>
 
<!-- NAVBAR -->

<div class="navbar">
<a href="index.html">Home</a>
<a href="test.html">Assessment</a>
<a href="memory-game.html">Memory</a>
<a href="attention-game.html">Attention</a>
<a href="processing-game.html">Processing</a>
<a href="logic-game.html">Logic</a>
<a href="dashboard.html">Dashboard</a>
</div>

<!-- DASHBOARD CARD -->

<div class="card">

<h1>📊 Performance Dashboard</h1>

<div class="metricGrid">

<div class="metricBox">
<h3>🧠 Neurocognitive Index</h3>
<div class="metricValue" id="ndi">0</div>
</div>

<div class="metricBox">
<h3>⚡ XP Level</h3>
<div class="metricValue" id="xp">0</div>
</div>

<div class="metricBox">
<h3>📈 Average Reaction Time</h3>
<div class="metricValue" id="rt">0 ms</div>
</div>

<div class="metricBox">
<h3>🧩 Memory Accuracy</h3>
<div class="metricValue" id="mem">0%</div>
</div>

</div>

</div>

<script>

/* ===============================
   LOAD DATA FROM LOCAL STORAGE
=============================== */

let ndi=localStorage.getItem("ndiScore")||0;
let xp=localStorage.getItem("xp")||0;
let rt=localStorage.getItem("avgReaction")||0;
let mem=localStorage.getItem("avgMemory")||0;

/* DISPLAY */

document.getElementById("ndi").innerText=
Number(ndi).toFixed(1);

document.getElementById("xp").innerText=
xp;

document.getElementById("rt").innerText=
Number(rt).toFixed(0)+" ms";

document.getElementById("mem").innerText=
(Number(mem)*100).toFixed(0)+"%";

</script>

</body>
</html>
