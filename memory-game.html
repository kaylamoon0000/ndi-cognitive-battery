<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Memory Training</title>
<link rel="stylesheet" href="style.css">
<script src="auth.js"></script>
 
<style>

body{
 margin:0;
 font-family:system-ui;
 background:linear-gradient(135deg,#0f172a,#020617);
 color:white;
}

/* NAVBAR */

.navbar{
 position:fixed;
 top:0;
 width:100%;
 padding:18px;
 background:rgba(2,6,23,.9);
 backdrop-filter:blur(20px);
 display:flex;
 justify-content:center;
 gap:30px;
 z-index:1000;
}

.navbar a{
 color:white;
 text-decoration:none;
 font-weight:600;
}

/* CARD */

.card{
 width:700px;
 max-width:90%;
 margin:140px auto;
 padding:50px;
 border-radius:24px;
 background:rgba(255,255,255,.05);
 backdrop-filter:blur(30px);
 text-align:center;
 box-shadow:0 40px 80px rgba(0,0,0,.6);
}

/* GAME GRID */

.grid{
 display:grid;
 grid-template-columns:repeat(4,1fr);
 gap:15px;
 margin-top:25px;
}

.cell{
 height:90px;
 border-radius:14px;
 background:#1abc9c;
 display:flex;
 justify-content:center;
 align-items:center;
 font-size:32px;
 cursor:pointer;
 transition:.25s;
}

.cell.selected{
 background:#e94560;
}

button{
 margin-top:20px;
 padding:14px 32px;
 border:none;
 border-radius:12px;
 background:linear-gradient(90deg,#e94560,#ff758c);
 color:white;
 font-size:18px;
 cursor:pointer;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">
<a href="index.html">Home</a>
<a href="test.html">Assessment</a>
<a href="memory-game.html">Memory</a>
<a href="attention-game.html">Attention</a>
<a href="processing-game.html">Processing</a>
<a href="logic-game.html">Logic</a>
<a href="dashboard.html">Dashboard</a>
</div>

<!-- GAME CARD -->

<div class="card">

<h1>🧠 Visual Memory Training</h1>

<div id="game"></div>

<button onclick="startRound()">Start Round</button>

</div>

<script>

/* ===============================
   MEMORY GAME LOGIC
=============================== */

const game=document.getElementById("game");

let originalScene=[];
let testScene=[];
let changedIndices=[];
let selections=new Set();

let round=0;

/* SYMBOL BANK */

const symbols=[
"🐶","🐱","🦊","🐼","🐸","🐵",
"🍎","🍌","🍓","🍇",
"⚽","🏀","🎲","🎯",
"🚗","✈️","🚀","🏆"
];

/* UTILS */

function shuffle(a){
 for(let i=a.length-1;i>0;i--){
  let j=Math.floor(Math.random()*(i+1));
  [a[i],a[j]]=[a[j],a[i]];
 }
}

function randomSymbol(){
 return symbols[Math.floor(Math.random()*symbols.length)];
}

function randomSymbolDifferent(old){
 let s=randomSymbol();
 while(s===old){
  s=randomSymbol();
 }
 return s;
}

/* GAME FLOW */

function startRound(){

 let size=8+Math.floor(round/2);

 originalScene=Array.from(
  {length:size},
  ()=>randomSymbol()
 );

 showScene(originalScene,"Memorize the scene");

 setTimeout(()=>{
  generateTestScene();
 },3000);

}

/* SHOW MEMORY SCENE */

function showScene(list,message){

 let html=`<h2>${message}</h2>`;
 html+=`<div class="grid">`;

 list.forEach(symbol=>{
  html+=`<div class="cell">${symbol}</div>`;
 });

 html+="</div>";

 game.innerHTML=html;
}

/* TEST SCENE */

function generateTestScene(){

 let size=originalScene.length;

 testScene=[...originalScene];

 changedIndices=[];

 let changeCount=2+Math.floor(round/3);

 for(let i=0;i<changeCount;i++){

  let index=Math.floor(Math.random()*size);

  if(!changedIndices.includes(index)){
   testScene[index]=randomSymbolDifferent(testScene[index]);
   changedIndices.push(index);
  }

 }

 shuffle(testScene);

 showInteractiveScene(changeCount);

}

/* USER SELECTION */

function showInteractiveScene(changeCount){

 let html=`
 <h2>Select the ${changeCount} new objects</h2>
 <div class="grid">
 `;

 testScene.forEach((symbol,index)=>{

  html+=`
  <div class="cell"
  onclick="toggleSelect(${index},this)">
  ${symbol}
  </div>
  `;

 });

 html+=`
 </div>
 <button onclick="checkAnswers()">
 Submit Answers
 </button>
 `;

 game.innerHTML=html;

 selections=new Set();

}

function toggleSelect(index,el){

 if(el.classList.contains("selected")){
  el.classList.remove("selected");
  selections.delete(index);
 }
 else{
  el.classList.add("selected");
  selections.add(index);
 }

}

/* SCORING */

function checkAnswers(){

 let correct=0;

 changedIndices.forEach(i=>{
  if(selections.has(i)) correct++;
 });

 alert(
 "You found "+correct+
 " / "+changedIndices.length+
 " changes"
 );

 round++;

 game.innerHTML="";

}

/* START */

startRound();

</script>

</body>
</html>
