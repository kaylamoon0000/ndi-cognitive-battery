<!DOCTYPE html>
<html>
<head>
<title>Visual Memory Training</title>
<link rel="stylesheet" href="style.css">

<style>

.grid{
 display:grid;
 grid-template-columns:repeat(4,1fr);
 gap:18px;
 margin:20px 0;
}

.cell{
 height:90px;
 background:#1abc9c;
 border-radius:14px;
 font-size:32px;
 display:flex;
 align-items:center;
 justify-content:center;
 cursor:pointer;
 transition:.25s;
}

.cell.selected{
 background:#e94560;
}

</style>
</head>

<body>

<div class="nav">
<a href="index.html">Home Test</a>
<a href="memory-game.html">Memory</a>
<a href="attention-game.html">Attention</a>
<a href="processing-game.html">Processing</a>
<a href="logic-game.html">Logic</a>
</div>

<div class="card">

<h1>Visual Memory 🧠</h1>

<div id="game"></div>

<button id="startBtn" onclick="startTrial()">
Start Trial
</button>

</div>

<script>

let ndi=Number(localStorage.getItem("ndiScore"))||50;
let round=0;

let originalObjects=[];
let trialObjects=[];
let changedIndices=[];
let selections=new Set();

const symbols=[
"🐶","🐱","🦊","🦁","🐸","🐵","🐼","🐨",
"🍎","🍌","🍓","🍇","⚽","🏀","🎲","🎯",
"🚗","✈️","🚀","🏆","🎮","📱"
];

function getDifficulty(){

 if(ndi<40) return 6 + Math.floor(round/2);
 if(ndi<70) return 8 + Math.floor(round/1.8);
 return 12 + Math.floor(round/1.5);

}

function startTrial(){

 document.getElementById("startBtn").style.display="none";

 let size=getDifficulty();

 // Generate original scene
 originalObjects=Array.from(
  {length:size},
  ()=>randomSymbol()
 );

 showScene(originalObjects,"Memorize this scene");

 // Show test scene after delay
 setTimeout(()=>{
   generateTestScene();
 },3000);

}

function generateTestScene(){

 let size=originalObjects.length;

 trialObjects=[...originalObjects];

 let changeCount = 2 + Math.floor(round/3);
 changedIndices=[];

 // Change random objects
 for(let i=0;i<changeCount;i++){

   let pos=Math.floor(Math.random()*size);

   if(!changedIndices.includes(pos)){
     trialObjects[pos]=randomSymbolDifferent(trialObjects[pos]);
     changedIndices.push(pos);
   }

 }

 shuffleArray(trialObjects);

 showScene(
   trialObjects,
   `Select the changed objects<br>
   ${changeCount} objects changed`,
   true
 );

}

function showScene(list,message,interactive=false){

 let html=`<h3>${message}</h3>`;

 html+=`<div class="grid">`;

 list.forEach((item,index)=>{
   html+=`
   <div class="cell"
   onclick="toggleSelect(${index},this)">
   ${item}
   </div>
   `;
 });

 html+="</div>";

 if(interactive){
   html+=`
   <button onclick="checkAnswers()">
   Submit Answers
   </button>
   `;
 }

 document.getElementById("game").innerHTML=html;

 selections=new Set();

}

function toggleSelect(index,el){

 if(el.classList.contains("selected")){
   el.classList.remove("selected");
   selections.delete(index);
 }else{
   el.classList.add("selected");
   selections.add(index);
 }

}

function checkAnswers(){

 let correct=0;

 changedIndices.forEach(i=>{
   if(selections.has(i)) correct++;
 });

 alert(
 "You found "+correct+
 " / "+changedIndices.length+
 " changed objects"
 );

 round++;

 document.getElementById("startBtn").style.display="inline-block";
 document.getElementById("game").innerHTML="";

}

function randomSymbol(){
 return symbols[Math.floor(Math.random()*symbols.length)];
}

function randomSymbolDifferent(old){
 let s=randomSymbol();
 while(s===old){
   s=randomSymbol();
 }
 return s;
}

function shuffleArray(arr){
 for(let i=arr.length-1;i>0;i--){
   let j=Math.floor(Math.random()*(i+1));
   [arr[i],arr[j]]=[arr[j],arr[i]];
 }
}

</script>

</body>
</html>
