<!DOCTYPE html>
<html>
<head>
<title>Visual Memory Training</title>
<link rel="stylesheet" href="style.css">

<style>

.grid{
 display:grid;
 grid-template-columns:repeat(4,1fr);
 gap:18px;
 margin:20px 0;
}

.cell{
 height:90px;
 background:#1abc9c;
 border-radius:14px;
 font-size:32px;
 display:flex;
 align-items:center;
 justify-content:center;
 cursor:pointer;
 transition:.25s;
}

.cell.selected{
 background:#e94560;
}

</style>
</head>

<body>

<div class="nav">
<a href="index.html">Home Test</a>
<a href="memory-game.html">Memory</a>
<a href="attention-game.html">Attention</a>
<a href="processing-game.html">Processing</a>
<a href="logic-game.html">Logic</a>
</div>

<div class="card">

<h1>Visual Memory 🧠</h1>

<div id="game"></div>

<button id="startBtn" onclick="startTrial()">
Start Trial
</button>

</div>

<script>

/* ---------- STATE ---------- */

let ndi=Number(localStorage.getItem("ndiScore"))||50;
let round=0;

let originalScene=[];
let testScene=[];
let changedObjectIDs=[];
let userSelections=new Set();

/* ---------- SYMBOL BANK ---------- */

const symbols=[
"🐶","🐱","🦊","🦁","🐸","🐵","🐼","🐨",
"🍎","🍌","🍓","🍇","⚽","🏀","🎲","🎯",
"🚗","✈️","🚀","🏆","🎮","📱","💡","🔬"
];

/* ---------- DIFFICULTY ---------- */

function getDifficulty(){

 if(ndi<40) return 6 + Math.floor(round/2);
 if(ndi<70) return 8 + Math.floor(round/1.5);
 return 12 + Math.floor(round/1.2);

}

/* ---------- GAME FLOW ---------- */

function startTrial(){

 document.getElementById("startBtn").style.display="none";

 let size=getDifficulty();
 let changeCount=2 + Math.floor(round/3);

 /* Create objects with unique IDs */
 originalScene=Array.from({length:size},(_,i)=>({
   id:i,
   symbol:randomSymbol()
 }));

 /* Create test scene (copy + change objects) */
 testScene=originalScene.map(obj=>({...obj}));

 changedObjectIDs=[];

 for(let i=0;i<changeCount;i++){

   let index=Math.floor(Math.random()*size);

   if(!changedObjectIDs.includes(index)){
     testScene[index].symbol =
     randomSymbolDifferent(testScene[index].symbol);

     changedObjectIDs.push(index);
   }

 }

 /* Show memory scene */
 showScene(
   originalScene.map(o=>o.symbol),
   "Memorize this scene"
 );

 /* Show test scene after delay */
 setTimeout(()=>{
   showInteractiveScene(changeCount);
 },3000);

}

/* ---------- RENDER ---------- */

function showScene(list,message){

 let html=`<h3>${message}</h3>`;
 html+=`<div class="grid">`;

 list.forEach(symbol=>{
   html+=`
   <div class="cell">
   ${symbol}
   </div>
   `;
 });

 html+="</div>";

 document.getElementById("game").innerHTML=html;

 userSelections=new Set();

}

function showInteractiveScene(changeCount){

 shuffleArray(testScene);

 let html=`
 <h3>Select the ${changeCount} changed objects</h3>
 <div class="grid">
 `;

 testScene.forEach((obj,idx)=>{

   html+=`
   <div class="cell"
   onclick="toggleSelect(${idx},this)">
   ${obj.symbol}
   </div>
   `;

 });

 html+=`
 </div>
 <button onclick="checkAnswers()">
 Submit Answers
 </button>
 `;

 document.getElementById("game").innerHTML=html;

}

/* ---------- INPUT ---------- */

function toggleSelect(index,el){

 if(el.classList.contains("selected")){
   el.classList.remove("selected");
   userSelections.delete(index);
 }else{
   el.classList.add("selected");
   userSelections.add(index);
 }

}

function checkAnswers(){

 let correct=0;

 changedObjectIDs.forEach(id=>{
   let testObj=testScene[id];

   if(!originalScene.some(o=>o.symbol===testObj.symbol)){
     if(userSelections.has(id)) correct++;
   }
 });

 alert(
 "You found "+correct+
 " / "+changedObjectIDs.length+
 " correct changes"
 );

 round++;

 document.getElementById("startBtn").style.display="inline-block";
 document.getElementById("game").innerHTML="";

}

/* ---------- UTIL ---------- */

function randomSymbol(){
 return symbols[Math.floor(Math.random()*symbols.length)];
}

function randomSymbolDifferent(old){
 let s=randomSymbol();
 while(s===old){
   s=randomSymbol();
 }
 return s;
}

function shuffleArray(arr){
 for(let i=arr.length-1;i>0;i--){
   let j=Math.floor(Math.random()*(i+1));
   [arr[i],arr[j]]=[arr[j],arr[i]];
 }
}

</script>

</body>
</html>
