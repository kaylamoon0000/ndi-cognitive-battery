<!DOCTYPE html>
<html>
<head>
<title>Visual Memory Training</title>
<link rel="stylesheet" href="style.css">

<style>

.grid{
 display:grid;
 grid-template-columns:repeat(4,1fr);
 gap:15px;
 margin:20px 0;
}

.item{
 background:#1abc9c;
 height:80px;
 border-radius:10px;
 display:flex;
 align-items:center;
 justify-content:center;
 font-size:30px;
 cursor:pointer;
 transition:.2s;
}

.item.selected{
 background:#e94560;
}

</style>
</head>

<body>

<div class="nav">
<a href="index.html">Home Test</a>
<a href="memory-game.html">Memory</a>
<a href="attention-game.html">Attention</a>
<a href="processing-game.html">Processing</a>
<a href="logic-game.html">Logic</a>
</div>

<div class="card">

<h1>Visual Memory 🧠</h1>

<div id="game"></div>

<button onclick="startRound()" id="startBtn">
Start Round
</button>

</div>

<script>

let ndi=Number(localStorage.getItem("ndiScore"))||50;

let round=0;
let originalSet=[];
let missingSet=[];
let selected=[];

const symbols=["⭐","🔺","⬛","🟢","💠","❤️","⚡","🌙","☀️","🔥"];

function getDifficulty(){

 if(ndi<40) return 5 + Math.floor(round/2);
 if(ndi<70) return 7 + Math.floor(round/2);
 return 10 + Math.floor(round/1.5);

}

function startRound(){

 document.getElementById("startBtn").style.display="none";

 let count=getDifficulty();

 originalSet=[];
 for(let i=0;i<count;i++){
   originalSet.push(
     symbols[Math.floor(Math.random()*symbols.length)]
   );
 }

 // Create altered version with 2 removals
 missingSet=[...originalSet];

 if(missingSet.length>2){
   missingSet.splice(
     Math.floor(Math.random()*missingSet.length),1
   );

   missingSet.splice(
     Math.floor(Math.random()*missingSet.length),1
   );
 }

 showGrid(originalSet,"Memorize these objects");

 setTimeout(()=>{
   showGrid(missingSet,"Select removed objects",true);
 },3000);

}

function showGrid(items,message,interactive=false){

 let html=`<h3>${message}</h3>`;

 html+=`<div class="grid">`;

 items.forEach(item=>{
   html+=`
   <div class="item"
   onclick="selectItem(this,'${item}',${interactive})">
   ${item}
   </div>
   `;
 });

 html+="</div>";

 if(interactive){
   html+=`
   <button onclick="checkAnswers()">
   Submit Answers
   </button>
   `;
 }

 document.getElementById("game").innerHTML=html;

 selected=[];
}

function selectItem(el,item,interactive){

 if(!interactive) return;

 el.classList.toggle("selected");

 if(selected.includes(item)){
   selected=selected.filter(x=>x!==item);
 }else{
   selected.push(item);
 }

}

function checkAnswers(){

 let removed=[];

 originalSet.forEach(x=>{
   if(!missingSet.includes(x)) removed.push(x);
 });

 let correct=0;

 selected.forEach(x=>{
   if(removed.includes(x)) correct++;
 });

 alert("You found "+correct+" correct removals!");

 round++;

 document.getElementById("startBtn").style.display="inline-block";
 document.getElementById("game").innerHTML="";

}

</script>

</body>
</html>
