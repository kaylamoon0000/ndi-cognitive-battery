<!DOCTYPE html>
<html>
<head>
<title>Visual Memory Training</title>
<link rel="stylesheet" href="style.css">

<style>

.grid{
 display:grid;
 grid-template-columns:repeat(4,1fr);
 gap:15px;
 margin:20px 0;
}

.cell{
 background:#1abc9c;
 height:80px;
 border-radius:10px;
 display:flex;
 align-items:center;
 justify-content:center;
 font-size:30px;
 cursor:pointer;
 transition:.2s;
}

.cell.selected{
 background:#e94560;
}

</style>
</head>

<body>

<div class="nav">
<a href="index.html">Home Test</a>
<a href="memory-game.html">Memory</a>
<a href="attention-game.html">Attention</a>
<a href="processing-game.html">Processing</a>
<a href="logic-game.html">Logic</a>
</div>

<div class="card">

<h1>Visual Memory 🧠</h1>

<div id="game"></div>

<button id="startBtn" onclick="startRound()">
Start Round
</button>

</div>

<script>

let ndi=Number(localStorage.getItem("ndiScore"))||50;

let round=0;
let originalGrid=[];
let removedIndices=[];
let userSelections=new Set();

const symbols=["⭐","🔺","⬛","🟢","💠","❤️","⚡","🌙","☀️","🔥"];

function getGridSize(){

 if(ndi<40) return 6;
 if(ndi<70) return 8;
 return 12;

}

function startRound(){

 document.getElementById("startBtn").style.display="none";

 let size=getGridSize();

 // Generate original grid
 originalGrid=[];
 for(let i=0;i<size;i++){
   originalGrid.push(
     symbols[Math.floor(Math.random()*symbols.length)]
   );
 }

 // Pick random positions to remove (2 removals minimum)
 removedIndices=[];
 let removalCount=2;

 while(removedIndices.length<removalCount){
   let r=Math.floor(Math.random()*size);
   if(!removedIndices.includes(r)){
     removedIndices.push(r);
   }
 }

 showGrid(originalGrid,"Memorize the objects");

 setTimeout(()=>{
   showChangedGrid();
 },3000);

}

function showGrid(grid,message,interactive=false){

 let html=`<h3>${message}</h3>`;
 html+=`<div class="grid">`;

 grid.forEach((item,index)=>{
   html+=`
   <div class="cell"
   onclick="toggleSelect(${index},this)">
   ${item}
   </div>
   `;
 });

 html+="</div>";

 if(interactive){
   html+=`
   <button onclick="checkAnswers()">
   Submit Answers
   </button>
   `;
 }

 document.getElementById("game").innerHTML=html;

 userSelections=new Set();

}

function showChangedGrid(){

 // Create copy with removals
 let newGrid=[...originalGrid];

 removedIndices.forEach(i=>{
   newGrid[i]="❌";
 });

 showGrid(newGrid,"Select removed objects",true);

}

function toggleSelect(index,el){

 if(!el.classList.contains("selected")){
   el.classList.add("selected");
   userSelections.add(index);
 }else{
   el.classList.remove("selected");
   userSelections.delete(index);
 }

}

function checkAnswers(){

 let correct=0;

 removedIndices.forEach(i=>{
   if(userSelections.has(i)) correct++;
 });

 alert(
   "You found "+correct+
   " / "+removedIndices.length+
   " removed objects"
 );

 round++;

 document.getElementById("startBtn").style.display="inline-block";
 document.getElementById("game").innerHTML="";

}

</script>

</body>
</html>
