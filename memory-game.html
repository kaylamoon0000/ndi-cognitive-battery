<!DOCTYPE html>
<html>
<head>
<title>Visual Memory Training</title>
<link rel="stylesheet" href="style.css">

<style>

.grid{
 display:grid;
 grid-template-columns:repeat(4,1fr);
 gap:15px;
 margin:20px 0;
}

.cell{
 height:80px;
 background:#1abc9c;
 border-radius:12px;
 font-size:30px;
 display:flex;
 align-items:center;
 justify-content:center;
 cursor:pointer;
 transition:.2s;
}

.cell.selected{
 background:#e94560;
}

</style>
</head>

<body>

<div class="nav">
<a href="index.html">Home Test</a>
<a href="memory-game.html">Memory</a>
<a href="attention-game.html">Attention</a>
<a href="processing-game.html">Processing</a>
<a href="logic-game.html">Logic</a>
</div>

<div class="card">

<h1>Visual Memory 🧠</h1>

<div id="game"></div>

<button id="startBtn" onclick="startRound()">
Start Round
</button>

</div>

<script>

let ndi=Number(localStorage.getItem("ndiScore"))||50;

let round=0;

let originalScene=[];
let newScene=[];
let addedIndices=[];
let userSelections=new Set();

const symbols=[
"🐶","🐱","🦊","🦁","🐸","🐵","🐼","🐨",
"🍎","🍌","🍓","🍇","⚽","🏀","🎲","🎯"
];

function getDifficultySize(){

 if(ndi<40) return 6 + Math.floor(round/2);
 if(ndi<70) return 8 + Math.floor(round/2);
 return 10 + Math.floor(round/1.5);

}

function startRound(){

 document.getElementById("startBtn").style.display="none";

 let size=getDifficultySize();

 // Generate random scene
 originalScene=Array.from({length:size},()=>randomSymbol());

 // Copy scene then add new objects
 newScene=[...originalScene];

 let addCount=2;

 addedIndices=[];

 while(addedIndices.length<addCount){

   let pos=Math.floor(Math.random()*newScene.length);

   if(!addedIndices.includes(pos)){
     newScene[pos]=randomSymbolDifferent(originalScene[pos]);
     addedIndices.push(pos);
   }

 }

 showScene(originalScene,"Memorize this scene");

 setTimeout(()=>{
   showScene(newScene,"Select NEW objects",true);
 },3000);

}

function randomSymbol(){
 return symbols[Math.floor(Math.random()*symbols.length)];
}

function randomSymbolDifferent(old){
 let s=randomSymbol();
 while(s===old){
   s=randomSymbol();
 }
 return s;
}

function showScene(scene,message,interactive=false){

 let html=`<h3>${message}</h3>`;
 html+=`<div class="grid">`;

 scene.forEach((item,index)=>{

   html+=`
   <div class="cell"
   onclick="toggleSelect(${index},this)">
   ${item}
   </div>
   `;

 });

 html+="</div>";

 if(interactive){
   html+=`
   <button onclick="checkAnswers()">
   Submit Answers
   </button>
   `;
 }

 document.getElementById("game").innerHTML=html;

 userSelections=new Set();

}

function toggleSelect(index,el){

 if(el.classList.contains("selected")){
   el.classList.remove("selected");
   userSelections.delete(index);
 }else{
   el.classList.add("selected");
   userSelections.add(index);
 }

}

function checkAnswers(){

 let correct=0;

 addedIndices.forEach(i=>{
   if(userSelections.has(i)) correct++;
 });

 alert(
 "You found "+correct+
 " / "+addedIndices.length+
 " new objects"
 );

 round++;

 document.getElementById("startBtn").style.display="inline-block";
 document.getElementById("game").innerHTML="";

}

</script>

</body>
</html>
