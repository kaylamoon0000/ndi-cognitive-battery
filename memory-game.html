<div class="card">
<h1>Memory Training 🧠</h1>
<div id="game"></div>
</div>

<script>

let ndi=Number(localStorage.getItem("ndiScore"))||50;

let sequence;

function startRound(){

 let base = ndi<40?3: ndi<70?4:6;
 let length = base + Math.floor(Math.random()*3);

 sequence=Array.from({length},
 ()=>Math.floor(Math.random()*9));

 document.getElementById("game").innerHTML=
 `<h2>${sequence.join(" ")}</h2>`;

 setTimeout(showInput,3000);
}

function showInput(){

 document.getElementById("game").innerHTML=`
 <p>Enter sequence</p>
 <input id="ans">
 <br><br>
 <button onclick="check()">Submit</button>
 `;

}

function check(){

 let input=document.getElementById("ans").value.split("").map(Number);

 let correct=0;

 for(let i=0;i<sequence.length;i++){
  if(sequence[i]==input[i]) correct++;
 }

 alert("Score: "+correct+"/"+sequence.length);

 startRound();

}

startRound();

</script>

</body>
</html>
