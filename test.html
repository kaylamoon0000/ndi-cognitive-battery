<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>NDI Cognitive Battery</title>

<style>
body {
  margin: 0;
  font-family: system-ui, sans-serif;
  background: linear-gradient(135deg, #1b1b2f, #162447);
  color: #f2f2f2;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
.card {
  background: #0f3460;
  border-radius: 16px;
  padding: 40px;
  width: 600px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  text-align: center;
}
button {
  margin-top: 24px;
  font-size: 18px;
  padding: 14px 32px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  background: #e94560;
  color: white;
}
button:hover { background: #ff5c77; }
input {
  font-size: 20px;
  padding: 10px;
  width: 80%;
  border-radius: 8px;
  border: none;
  margin-top: 16px;
  text-align: center;
}
.timer { font-size: 16px; opacity: 0.85; }
.big { font-size: 34px; font-weight: bold; }
</style>
</head>

<body>

<div style="
position: fixed;
top: 0;
width: 100%;
background:#0b1d3a;
padding:15px;
display:flex;
justify-content:center;
gap:30px;
z-index:1000;
">

<a style="color:white;text-decoration:none;font-weight:bold" href="index.html">Home Test</a>
<a style="color:white;text-decoration:none;font-weight:bold" href="memory-game.html">Memory Game</a>
<a style="color:white;text-decoration:none;font-weight:bold" href="attention-game.html">Attention Game</a>
<a style="color:white;text-decoration:none;font-weight:bold" href="processing-game.html">Processing Speed</a>
<a style="color:white;text-decoration:none;font-weight:bold" href="logic-game.html">Logic Game</a>

</div>

<div class="card" id="card" style="margin-top:80px"></div>
<script>
const card = document.getElementById("card");

/* ---------- UTIL ---------- */
function avg(arr){ return arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0; }
function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
}

/* ---------- PHRASES ---------- */
let phrases = [
  "working memory capacity",
  "reaction time assessment",
  "neural signal transmission",
  "cognitive processing speed",
  "executive function control",
  "information processing rate",
  "attention switching cost",
  "decision making latency",
  "sensorimotor coordination",
  "neural efficiency measure",
  "visual attention stability",
  "task switching performance",
  "motor planning execution",
  "short term memory load",
  "cognitive control systems",
  "adaptive neural response"
];

shuffle(phrases);
let phraseIndex = 0;
function nextPhrase(){
  if(phraseIndex >= phrases.length){
    shuffle(phrases);
    phraseIndex = 0;
  }
  return phrases[phraseIndex++];
}

/* ---------- DATA ---------- */
let typingWPM = [];
let reactionTimes = [];
let memoryAccuracy = [];

/* ---------- HOME ---------- */
function home(){
  card.innerHTML = `
    <h1>Neurocognitive Assessment 🧠</h1>
    <p>
      Measures typing speed, reaction time, and working memory.<br>
      ~3 minutes • Non-diagnostic
    </p>
    <button onclick="typingIntro()">Start</button>
  `;
}

/* ---------- TYPING ---------- */
let typed="", phrase, phraseStart, typingStart, typingTimer;

function typingIntro(){
  card.innerHTML = `
    <h1>Typing Task</h1>
    <p>Type the phrase and press Enter.<br>Duration: 60 seconds</p>
    <button onclick="startTyping()">Begin</button>
  `;
}

function startTyping(){
  typingWPM=[];
  typed="";
  phrase = nextPhrase();
  phraseStart = performance.now();
  typingStart = performance.now();
  document.addEventListener("keydown",typingKey);
  typingTimer = setInterval(updateTyping,100);
}

function updateTyping(){
  let elapsed=(performance.now()-typingStart)/1000;
  if(elapsed>=60){
    clearInterval(typingTimer);
    document.removeEventListener("keydown",typingKey);
    reactionIntro();
    return;
  }
  card.innerHTML = `
    <div class="timer">${Math.ceil(60-elapsed)}s</div>
    <div class="big">${phrase}</div>
    <p>${typed}</p>
  `;
}

function typingKey(e){
  if(e.key==="Enter"){
    let t=(performance.now()-phraseStart)/1000;
    typingWPM.push((phrase.split(" ").length/t)*60);
    typed="";
    phrase=nextPhrase();
    phraseStart=performance.now();
  } else if(e.key==="Backspace"){
    typed=typed.slice(0,-1);
  } else if(e.key.length===1){
    typed+=e.key;
  }
}

/* ---------- REACTION ---------- */
let reactionStart=null, reactionPhaseStart;

function reactionIntro(){
  card.innerHTML = `
    <h1>Reaction Time</h1>
    <p>Press SPACE when you see GO!<br>Duration: 60 seconds</p>
    <button onclick="startReaction()">Begin</button>
  `;
}

function startReaction(){
  reactionTimes=[];
  reactionPhaseStart=performance.now();
  nextReaction();
}

function nextReaction(){
  if((performance.now()-reactionPhaseStart)/1000>=60){
    memoryIntro();
    return;
  }
  card.innerHTML="<h1>Wait…</h1>";
  setTimeout(()=>{
    reactionStart=performance.now();
    card.innerHTML="<h1 class='big'>GO!</h1>";
  },1500+Math.random()*1500);
}

document.addEventListener("keydown",e=>{
  if(reactionStart && e.code==="Space"){
    reactionTimes.push(performance.now()-reactionStart);
    reactionStart=null;
    nextReaction();
  }
});

/* ---------- MEMORY ---------- */
let memoryPhaseStart, memorySeq;

function memoryIntro(){
  card.innerHTML = `
    <h1>Memory Task</h1>
    <p>Remember the numbers.<br>Difficulty increases gradually.<br>60 seconds</p>
    <button onclick="startMemory()">Begin</button>
  `;
}

function startMemory(){
  memoryAccuracy=[];
  memoryPhaseStart=performance.now();
  nextMemory();
}

function nextMemory(){
  let elapsed=(performance.now()-memoryPhaseStart)/1000;
  if(elapsed>=60){
    showResults();
    return;
  }

  let length =
    elapsed < 20 ? 3 :
    elapsed < 40 ? 4 :
    elapsed < 55 ? 5 : 6;

  memorySeq = Array.from({length},()=>Math.floor(Math.random()*9)+1);

  card.innerHTML=`<div class="big">${memorySeq.join(" ")}</div>`;

  setTimeout(()=>{
    card.innerHTML=`
      <p>Enter the sequence:</p>
      <input id="mem" autofocus>
      <button onclick="submitMemory()">Submit</button>
    `;
  },3000);
}

function submitMemory(){
  let raw = document.getElementById("mem").value || "";
  let input = (raw.match(/\d/g) || []).map(Number);

  let correct=0;
  for(let i=0;i<memorySeq.length;i++){
    if(input[i]===memorySeq[i]) correct++;
  }
  memoryAccuracy.push(correct/memorySeq.length);
  nextMemory();
}

/* ---------- RESULTS ---------- */
function showResults(){
  let avgWPM=avg(typingWPM);
  let avgRT=avg(reactionTimes);
  let avgMem=avg(memoryAccuracy);

  let ndi=(
    Math.min(Math.abs(avgWPM-45)/65,1)+
    Math.min(Math.abs(avgRT-250)/350,1)+
    Math.min(Math.abs(avgMem-0.85)/0.6,1)
  )/3*100;

  card.innerHTML=`
    <h1>Results</h1>
    <p><b>NDI: ${ndi.toFixed(1)} / 100</b></p>
    <p>
      Typing: ${avgWPM.toFixed(1)} WPM<br>
      Reaction: ${avgRT.toFixed(0)} ms<br>
      Memory accuracy: ${(avgMem*100).toFixed(0)}%
    </p>
    <p style="opacity:.8">Lower = closer to expected healthy baseline</p>
    <button onclick="home()">Restart</button>
  `;
}

home();
</script>

</body>
</html>
