<!DOCTYPE html>
<style>

/* ===============================
   GLOBAL MODERN NEURO UX STYLE
=============================== */

body{
 margin:0;
 font-family:system-ui,sans-serif;

 background: radial-gradient(
   circle at top,
   #0f172a,
   #020617 70%
 );

 color:white;
 min-height:100vh;
}

/* ===============================
   NAVBAR
=============================== */

nav, div[style*="position: fixed"]{
 backdrop-filter: blur(20px);
 background: rgba(2,6,23,0.85);
 border-bottom: 1px solid rgba(255,255,255,0.05);
}

/* Nav links */
a{
 color:#e2e8f0;
 text-decoration:none;
 font-weight:600;
 transition:0.3s;
}

a:hover{
 color:#38bdf8;
}

/* ===============================
   MAIN CARD UI
=============================== */

.card{
 margin-top:120px;
 width:650px;
 max-width:92%;

 padding:50px;

 border-radius:28px;

 background: rgba(255,255,255,0.05);
 backdrop-filter: blur(30px);

 box-shadow:
 0 40px 80px rgba(0,0,0,.6),
 inset 0 1px 1px rgba(255,255,255,.05);

 text-align:center;

 animation: fadeIn 0.6s ease;
}

/* ===============================
   TEXT
=============================== */

h1,h2,h3{
 letter-spacing:0.5px;
}

.big{
 font-size:42px;
 font-weight:700;
 background: linear-gradient(90deg,#38bdf8,#e94560);
 -webkit-background-clip:text;
 -webkit-text-fill-color:transparent;
}

.timer{
 font-size:18px;
 opacity:0.8;
}

/* ===============================
   BUTTONS
=============================== */

button{
 margin-top:24px;

 padding:15px 35px;

 font-size:18px;
 font-weight:600;

 border:none;
 border-radius:14px;

 cursor:pointer;

 background: linear-gradient(
  135deg,
  #e94560,
  #ff758c
 );

 color:white;

 transition:0.3s ease;
 box-shadow:0 10px 30px rgba(0,0,0,.3);
}

button:hover{
 transform:translateY(-3px);
 box-shadow:0 20px 40px rgba(0,0,0,.4);
}

/* ===============================
   INPUTS
=============================== */

input{
 margin-top:20px;

 font-size:20px;

 padding:14px;

 width:85%;

 border-radius:14px;

 border:none;

 text-align:center;

 background: rgba(255,255,255,0.07);
 color:white;

 backdrop-filter: blur(20px);
}

/* ===============================
   ANIMATIONS
=============================== */

@keyframes fadeIn{
 from{
   opacity:0;
   transform:translateY(20px);
 }
 to{
   opacity:1;
   transform:translateY(0);
 }
}

</style>
