<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Reaction Time Training</title>

<link rel="stylesheet" href="style.css">

<style>

/* PAGE BACKGROUND */

body{
 margin:0;
 font-family:system-ui,sans-serif;
 background:linear-gradient(135deg,#0f172a,#020617);
 color:white;
}

/* NAVBAR */

.navbar{
 position:fixed;
 top:0;
 width:100%;
 padding:18px;
 background:rgba(2,6,23,.9);
 backdrop-filter:blur(20px);
 display:flex;
 justify-content:center;
 gap:30px;
 z-index:1000;
}

.navbar a{
 color:white;
 text-decoration:none;
 font-weight:600;
}

/* CARD */

.card{
 width:700px;
 max-width:90%;
 margin:140px auto;
 padding:50px;
 border-radius:24px;
 background:rgba(255,255,255,.05);
 backdrop-filter:blur(30px);
 text-align:center;
 box-shadow:0 40px 80px rgba(0,0,0,.6);
}

/* BIG REACTION BUTTON */

#reactionBox{
 margin-top:40px;
 width:220px;
 height:220px;
 border-radius:50%;
 background:#1abc9c;
 display:flex;
 justify-content:center;
 align-items:center;
 font-size:40px;
 cursor:pointer;
 transition:.3s;
}

#reactionBox.wait{
 background:#e94560;
}

#reactionBox.ready{
 background:#38bdf8;
}

button{
 margin-top:20px;
 padding:14px 32px;
 border:none;
 border-radius:12px;
 background:linear-gradient(90deg,#e94560,#ff758c);
 color:white;
 font-size:18px;
 cursor:pointer;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">
<a href="index.html">Home</a>
<a href="test.html">Assessment</a>
<a href="memory-game.html">Memory</a>
<a href="attention-game.html">Attention</a>
<a href="processing-game.html">Processing</a>
<a href="logic-game.html">Logic</a>
<a href="dashboard.html">Dashboard</a>
</div>

<!-- GAME CARD -->

<div class="card">

<h1>👁️ Reaction Time Training</h1>

<div id="gameArea"></div>

<button onclick="startRound()">Start Round</button>

</div>

<script>

/* ===============================
   REACTION TIME GAME LOGIC
=============================== */

const gameArea=document.getElementById("gameArea");

let reactionStart=null;
let reactionTimes=[];
let round=0;

function startRound(){

 gameArea.innerHTML="";

 let box=document.createElement("div");
 box.id="reactionBox";
 box.innerText="WAIT";

 gameArea.appendChild(box);

 box.classList.add("wait");

 let delay=1500+Math.random()*3000;

 setTimeout(()=>{

  box.classList.remove("wait");
  box.classList.add("ready");

  box.innerText="GO!";

  reactionStart=performance.now();

 },delay);

 box.onclick=()=>{

  if(!reactionStart) return;

  let time=performance.now()-reactionStart;

  reactionTimes.push(time);

  alert("Reaction Time: "+time.toFixed(0)+" ms");

  round++;

  gameArea.innerHTML="";

 };

}

/* START FIRST ROUND */

startRound();

</script>

</body>
</html>
