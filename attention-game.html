<script>

let reactionStart;

function nextRound(){

 let wait=1500+Math.random()*1500;

 let btn=document.getElementById("btn");

 btn.innerText="Wait...";

 setTimeout(()=>{

  btn.style.background="#2ecc71";
  btn.innerText="CLICK!";

  reactionStart=performance.now();

 },wait);

}

function clickBtn(){

 if(!reactionStart) return;

 let rt=performance.now()-reactionStart;

 alert("Reaction: "+Math.floor(rt)+" ms");

 reactionStart=null;

 document.getElementById("btn").style.background="#e94560";

 nextRound();

}

nextRound();

</script>
