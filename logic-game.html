<!-- GAME CARD -->

<div class="card">

<h1>🧠 Logic Training</h1>

<div id="gameArea">

<button onclick="showStartScreen()">
Start Logic Test
</button>

</div>

</div>

<script>

/* ===============================
   LOGIC GAME LOGIC
=============================== */

const gameArea=document.getElementById("gameArea");

let currentAnswer=0;

/* QUESTION GENERATOR */

function generateQuestion(){

 let a=Math.floor(Math.random()*20);
 let b=Math.floor(Math.random()*20);
 let c=Math.floor(Math.random()*10);

 let type=Math.floor(Math.random()*3);

 if(type===0){

  currentAnswer=a+b+c;
  return `${a} + ${b} + ${c} = ?`;

 }

 if(type===1){

  currentAnswer=a*b + c;
  return `${a} × ${b} + ${c} = ?`;

 }

 let seq=[a,a+c,a+2*c,a+3*c];
 currentAnswer=seq[3];

 return seq.join(", ")+" , ?";

}

/* START SCREEN */

function showStartScreen(){

 gameArea.innerHTML=`
 <h2>Press Start When Ready</h2>
 <button onclick="startLogicRound()">
 Start Test
 </button>
 `;

}

/* GAME ROUND */

function startLogicRound(){

 let question=generateQuestion();

 gameArea.innerHTML=`
 <div class="big">${question}</div>

 <input id="ans" placeholder="Enter answer">

 <button onclick="checkLogicAnswer()">
 Submit Answer
 </button>
 `;

}

/* CHECK ANSWER */

function checkLogicAnswer(){

 let userAns=parseInt(
 document.getElementById("ans").value
 );

 if(userAns===currentAnswer){
 alert("Correct!");
 }
 else{
 alert("Wrong! Correct answer: "+currentAnswer);
 }

 gameArea.innerHTML=`
 <button onclick="startLogicRound()">
 Next Question
 </button>
 `;

}

/* INITIAL SCREEN */

showStartScreen();

</script>
