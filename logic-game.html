<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Logic Training</title>

<link rel="stylesheet" href="style.css">

<style>

/* GLOBAL BACKGROUND */

body{
 margin:0;
 font-family:system-ui,sans-serif;
 background:linear-gradient(135deg,#0f172a,#020617);
 color:white;
}

/* NAVBAR */

.navbar{
 position:fixed;
 top:0;
 width:100%;
 padding:18px;
 background:rgba(2,6,23,.9);
 backdrop-filter:blur(20px);
 display:flex;
 justify-content:center;
 gap:30px;
 z-index:1000;
}

.navbar a{
 color:white;
 text-decoration:none;
 font-weight:600;
}

/* CARD */

.card{
 width:700px;
 max-width:90%;
 margin:140px auto;
 padding:50px;
 border-radius:24px;
 background:rgba(255,255,255,.05);
 backdrop-filter:blur(30px);
 text-align:center;
 box-shadow:0 40px 80px rgba(0,0,0,.6);
}

/* INPUT */

input{
 padding:14px;
 width:80%;
 border-radius:10px;
 border:none;
 font-size:20px;
 text-align:center;
 background:rgba(255,255,255,.08);
 color:white;
}

button{
 margin-top:20px;
 padding:14px 32px;
 border:none;
 border-radius:12px;
 background:linear-gradient(90deg,#e94560,#ff758c);
 color:white;
 font-size:18px;
 cursor:pointer;
}

.big{
 font-size:32px;
 font-weight:bold;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">
<a href="index.html">Home</a>
<a href="test.html">Assessment</a>
<a href="memory-game.html">Memory</a>
<a href="attention-game.html">Attention</a>
<a href="processing-game.html">Processing</a>
<a href="logic-game.html">Logic</a>
<a href="dashboard.html">Dashboard</a>
</div>

<!-- GAME CARD -->

<div class="card">

<h1>🧠 Logic Training</h1>

<div id="game"></div>

<button onclick="startRound()">Start Round</button>

</div>

<script>

/* ===============================
   LOGIC GAME LOGIC
=============================== */

const game=document.getElementById("game");

let round=0;
let currentAnswer=0;

/* QUESTION BANK */

function generateQuestion(){

 let a=Math.floor(Math.random()*20);
 let b=Math.floor(Math.random()*20);
 let c=Math.floor(Math.random()*10);

 let type=Math.floor(Math.random()*3);

 if(type===0){

  // ADDITION LOGIC
  currentAnswer=a+b+c;

  return `${a} + ${b} + ${c} = ?`;

 }

 if(type===1){

  // MULTIPLICATION LOGIC
  currentAnswer=a*b + c;

  return `${a} × ${b} + ${c} = ?`;

 }

 // SEQUENCE LOGIC
 let seq=[a,a+c,a+2*c,a+3*c];
 currentAnswer=seq[3];

 return seq.join(", ")+" , ?";

}

/* GAME FLOW */

function startRound(){

 let question=generateQuestion();

 game.innerHTML=`
 <div class="big">${question}</div>

 <input id="ans" placeholder="Enter answer">

 <button onclick="checkAnswer()">
 Submit
 </button>
 `;

}

/* CHECK ANSWER */

function checkAnswer(){

 let userAns=parseInt(
 document.getElementById("ans").value
 );

 if(userAns===currentAnswer){
 alert("Correct!");
 }
 else{
 alert("Wrong! Correct answer: "+currentAnswer);
 }

 round++;

 game.innerHTML="";

}

/* START FIRST ROUND */

startRound();

</script>

</body>
</html>
